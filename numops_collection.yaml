            value: ES
            disabled: false
            id: pair_242c82e8c729409a93066494748d8b4f
        headers:
          - name: User-Agent
            value: insomnia/12.0.0
        scripts:
          afterResponse: >-
            test1();


            function test1(){
            	const response = JSON.parse(insomnia.response.body);

            	const list = response.content;

            	// valida se é array
            	if (!Array.isArray(list)) {
            			throw new Error("content não é uma lista");
            	}

            	const numeros = list.map(item => item.numero);

            	console.log(numeros);

            	// detectar duplicados
            	const repetidos = numeros.filter((item, index) => numeros.indexOf(item) !== index);

            	// testes
            	insomnia.test("Lista não deve estar vazia", () => {
            			insomnia.expect(numeros.length).to.be.greaterThan(0);
            	});

            	insomnia.test("Não deve conter números duplicados", () => {
            			insomnia.expect(repetidos.length).to.equal(0);
            	});

            	console.log("Total:", numeros.length);
            	console.log("Repetidos:", repetidos);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
